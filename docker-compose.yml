services:
  postgres:
    image: postgres:15-alpine
    container_name: pdp-db-local
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: product_data_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: pdp-cache-local
    ports:
      - "6379:6379"

volumes:
  postgres_data:
